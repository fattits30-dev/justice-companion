name: "🐛 Bug Report"
description: "Report a bug in Justice Companion"
title: "[Bug]: "
labels: ["bug", "needs-triage"]
assignees: ["sava6"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! This helps make Justice Companion more reliable for legal aid organizations.
        
        **⚖️ Note:** If this involves sensitive legal data, please email instead of using public GitHub issues.
        
  - type: input
    id: version
    attributes:
      label: "Justice Companion Version"
      description: "What version are you using? (Check Help > About)"
      placeholder: "v1.0.0"
    validations:
      required: true
      
  - type: dropdown
    id: platform
    attributes:
      label: "Platform"
      description: "What operating system?"
      options:
        - Windows 10/11
        - macOS
        - Linux Ubuntu
        - Linux Other
        - Other
    validations:
      required: true
      
  - type: textarea
    id: description
    attributes:
      label: "Bug Description"
      description: "Clear description of what happened"
      placeholder: "The AI chat stopped responding when I..."
    validations:
      required: true
      
  - type: textarea
    id: steps
    attributes:
      label: "Steps to Reproduce"
      description: "How can we reproduce this bug?"
      placeholder: |
        1. Open Justice Companion
        2. Go to Cases tab
        3. Click '...'
        4. Bug occurs
    validations:
      required: true
      
  - type: textarea
    id: expected
    attributes:
      label: "Expected Behavior"
      description: "What should have happened?"
      placeholder: "The case should have saved successfully"
    validations:
      required: true
      
  - type: textarea
    id: actual
    attributes:
      label: "Actual Behavior"
      description: "What actually happened?"
      placeholder: "Error message appeared and case was not saved"
    validations:
      required: true
      
  - type: textarea
    id: logs
    attributes:
      label: "Console Logs/Error Messages"
      description: "Any error messages or console output (if applicable)"
      placeholder: "Paste error messages here (remove any personal information)"
      render: text
      
  - type: dropdown
    id: priority
    attributes:
      label: "Impact Level"
      description: "How does this affect your legal work?"
      options:
        - "Critical - Prevents legal work"
        - "High - Major feature broken"
        - "Medium - Workaround available"
        - "Low - Minor annoyance"
    validations:
      required: true
      
  - type: checkboxes
    id: checklist
    attributes:
      label: "Pre-submission Checklist"
      options:
        - label: "I have searched existing issues for duplicates"
          required: true
        - label: "I have removed any sensitive legal/client information"
          required: true
        - label: "I can reproduce this bug consistently"
          required: false
        - label: "I have tried restarting the application"
          required: false