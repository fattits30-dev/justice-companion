<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Justice Companion - Free Legal Aid</title>
    <meta name="description" content="Free legal aid for those who can't afford justice - built from pain, powered by truth">

    <!-- Web App Manifest -->
    <meta name="theme-color" content="#0f9488">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Justice Companion">

    <!-- SEO and Social -->
    <meta property="og:title" content="Justice Companion - Free Legal Aid">
    <meta property="og:description" content="Free legal assistance for those who can't afford justice. AI-powered legal information and support.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="/og-image.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Justice Companion - Free Legal Aid">
    <meta name="twitter:description" content="Free legal assistance for those who can't afford justice">

    <!-- Security -->
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        script-src 'self' 'unsafe-inline' 'unsafe-eval';
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src 'self' https://fonts.gstatic.com;
        img-src 'self' data: blob:;
        connect-src 'self' http://localhost:11434 https:;
        worker-src 'self' blob:;
    ">

    <!-- Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">

    <!-- Preload critical resources -->
    <link rel="modulepreload" href="/src/renderer/main.jsx">
    <link rel="preload" href="/src/renderer/App.css" as="style">
    <!-- ChatInterface loaded dynamically -->

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/png" href="/favicon.png">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* Critical CSS for initial load */
        body {
            margin: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8f9fa;
            overflow: hidden;
        }

        #root {
            height: 100vh;
            width: 100vw;
        }

        /* Loading state to prevent FOUC */
        .initial-loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #ffffff;
            font-family: 'Inter', sans-serif;
        }

        .loading-text {
            font-size: 18px;
            color: #4a5568;
        }
    </style>
</head>
<body>
    <div id="root">
        <div class="initial-loading">
            <div class="loading-text">⚖️ Initializing Justice Companion...</div>
        </div>
    </div>
    <script type="module" src="/src/renderer/main.jsx"></script>

    <!-- Service Worker Registration for PWA -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .catch(err => console.log('SW registration failed'));
            });
        }
    </script>
</body>
</html>
